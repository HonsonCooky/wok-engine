document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

12px; display: flex; justify-content: space-between; align-items: flex-start; gap: 40px;\">\n    <div>\n      <div style=\"font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--label); font-weight: 600;\">wok-engine &nbsp;/&nbsp; editor<\u002Fdiv>\n      <h1 style=\"font-size: 34px; font-weight: 650; margin: 8px 0 10px; letter-spacing: -0.01em; color: var(--ink);\">Editor surfaces — design spec<\u002Fh1>\n      <p style=\"font-size: 15px; line-height: 1.6; color: var(--muted); margin: 0; max-width: 760px; text-wrap: pretty;\">Every authoring surface on the rebuild roadmap, resolved in the exact flat Zed palette from <code style=\"font-family:'JetBrains Mono',monospace;font-size:13px;background:var(--chip);padding:1px 5px;border-radius:3px;\">theme.rs<\u002Fcode> — both themes, following the OS. Numbered pins carry build notes: the egui widget, point dimensions, and the action each control emits. The chrome is built and locked; these are the per-context views that drop into it.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"flex: none; display: flex; flex-direction: column; align-items: flex-end; gap: 6px; padding-top: 6px;\">\n      <span style=\"font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--label); font-weight: 600;\">Theme<\u002Fspan>\n      <div style=\"display: flex; gap: 3px; padding: 3px; background: var(--chip); border-radius: 7px;\">\n        <button onclick=\"{{ setSystem }}\" style=\"{{ styleSystem }}\">System<\u002Fbutton>\n        <button onclick=\"{{ setLight }}\" style=\"{{ styleLight }}\">Light<\u002Fbutton>\n        <button onclick=\"{{ setDark }}\" style=\"{{ styleDark }}\">Dark<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ===== Insights band ===== -->\n  <div style=\"max-width: 1000px; margin: 28px 0 44px; background: var(--feature-bg); border: 1px solid var(--feature-border); border-radius: 8px; padding: 26px 30px;\">\n    <div style=\"font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase; color: #4a86d8; font-weight: 600; margin-bottom: 16px;\">Insights — where the design earns more than a skeleton<\u002Fdiv>\n    <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 22px 40px;\">\n      <div>\n        <div style=\"font-size: 14.5px; font-weight: 600; color: var(--feature-ink); margin-bottom: 5px;\">1 &nbsp; Make the placement boundary legible<\u002Fdiv>\n        <div style=\"font-size: 13.5px; line-height: 1.55; color: var(--feature-sub);\">Group inspector fields as <b style=\"color:var(--feature-strong);\">Identity / Transform / Physical<\u002Fb> and close with one dim line: \"Gameplay config binds in code by id or name.\" Authors stop hunting for a property bag the editor refuses to own.<\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-size: 14.5px; font-weight: 600; color: var(--feature-ink); margin-bottom: 5px;\">2 &nbsp; A bottom icon bar, not nested tabs<\u002Fdiv>\n        <div style=\"font-size: 13.5px; line-height: 1.55; color: var(--feature-sub);\">Collapse Scenes/Prefabs (project) and Instances/Lighting (this-scene) into one Zed-style icon row at the panel foot, split by a divider so scope stays honest. The body belongs wholly to the active view.<\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-size: 14.5px; font-weight: 600; color: var(--feature-ink); margin-bottom: 5px;\">3 &nbsp; One viewport, tool modes — not tabs<\u002Fdiv>\n        <div style=\"font-size: 13.5px; line-height: 1.55; color: var(--feature-sub);\">Place/select, sculpt, and paint are <i>modes<\u002Fi> of the one Scene view (a level is built holistically), each surfacing only its own floating controls — brush params while sculpting, the hotbar while placing. Never a tab per tool.<\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-size: 14.5px; font-weight: 600; color: var(--feature-ink); margin-bottom: 5px;\">4 &nbsp; Status bar belongs to the view column<\u -weight: 700; display: flex; align-items: center; justify-content: center;\">1<\u002Fdiv><div style=\"font-size: 13.5px; line-height: 1.55; color: var(--noteink);\"><b style=\"color:var(--notestrong);\">Bottom-bar nav.<\u002Fb> Existing <code style=\"font-family:'JetBrains Mono',monospace;font-size:12px;\">SidePanel<\u002Fcode>. A foot icon row switches the panel view; project group (Scenes/Prefabs) and this-scene group (Instances/Lighting) split by a divider. New <code style=\"font-family:'JetBrains Mono',monospace;font-size:12px;\">Action::SelectNavView<\u002Fcode>; reads <code style=\"font-family:'JetBrains Mono',monospace;font-size:12px;\">model.shell<\u002Fcode> + content. Detail → Section 2.<\u002Fdiv><\u002Fdiv>\n        <div style=\"display: flex; gap: 12px;\"><div style=\"flex:none; width: 22px; height: 22px; border-radius: 50%; background: var(--notepin); color: #fff; font-size: 12px; font-weight: 700; display: flex; align-items: center; justify-content: center;\">2<\u002Fdiv><div style=\"font-size: 13.5px; line-height: 1.55; color: var(--noteink);\"><b style=\"color:var(--notestrong);\">Tab bar &amp; inline hamburger.<\u002Fb> Unchanged from <code style=\"font-family:'JetBrains Mono',monospace;font-size:12px;\">workspace::tab_bar<\u002Fcode>. 38pt; the hamburger lives inline at the left of the tab strip (no separate menu bar), then hand-drawn cells; active = editor_bg fill + 2pt accent top line.<\u002Fdiv><\u002Fdiv>\n        <div style=\"display: flex; gap: 12px;\"><div style=\"flex:none; width: 22px; height: 22px; border-radius: 50%; background: var(--notepin); color: #fff; font-size: 12px; font-weight: 700; display: flex; align-items: center; justify-content: center;\">3<\u002Fdiv><div style=\"font-size: 13.5px; line-height: 1.55; color: var(--noteink);\"><b style=\"color:var(--notestrong);\">Picking + gizmo.<\u002Fb> Left-click in the transparent <code style=\"font-family:'JetBrains Mono',monospace;font-size:12px;\">CentralPanel<\u002Fcode> casts a ray (reuse <code style=\"font-family:'JetBrains Mono',monospace;font-size:12px;\">editor_rect<\u002Fcode>) → <code style=\"font-family:'JetBrains Mono',monospace;font-size:12px;\">Action::Select(id)<\u002Fcode>. Outline + axis gizmo are drawn by <b>wok-render<\u002Fb> (3D), not egui. Drag-move rides the gizmo (step 4).<\u002Fdiv><\u002Fdiv>\n        <div style=\"display: flex; gap: 12px;\"><div style=\"flex:none; width: 22px; height: 22px; border-radius: 50%; background: var(--notepin); color: #fff; font-size: 12px; font-weight: 700; display: flex; align-items: center; justify-content: center;\">4<\u002Fdiv><div style=\"font-size: 13.5px; line-height: 1.55; color: var(--noteink);\"><b style=\"color:var(--notestrong);\">Floating inspector.<\u002Fb> <code style=\"font-family:'JetBrains Mono',monospace;font-size:12px;\">egui::Window<\u002Fcode> clipped to the editor area, present <i>only<\u002Fi> on a non-empty selection. Reads the SelectionSet; each field emits a transform/identity/physical action through the single writer. Identity / Transform / Physical, closing on the boundary line.<\u002Fdiv><\u002Fdiv>\n        <div style=\"display: flex; gap: 12px;\"><div style=\"flex:none; width: 22px; height: 22px; border-radius: 50%; background: var(--notepin); color: #fff; font-size: 12px; font-weight: 700; display: flex; align-items: center; justify-content: center;\">5<\u002Fdiv><div style=\"font-size: 13.5px; line-height: 1.55; color: var(--noteink);\"><b style=\"color:var(--notestrong);\">Status bar.<\u002Fb> Extend <code style=\"font-family:'JetBrains Mono',monospace;font-size:12px;\">menu::status_bar<\u002Fcode>, but it belongs to the <b>view column<\u002Fb> — inside the <code style=\"font-family:'JetBrains Mono',monospace;font-size:12px;\">CentralPanel<\u002Fcode> stack, spanning only the editor area. Left = view context; right = diagnostics. Save dot is the Save target; integrity count opens Integrity.<\u002Fdiv><\u002Fdiv>\n        <div style=\"display: flex; gap: 12p ound\"><path d=\"M21 7.5 12 3 3 7.5v9L12 21l9-4.5v-9Z\"><\u002Fpath><\u002Fsvg><\u002Fspan><span style=\"flex:1; font-family:'JetBrains Mono',monospace; font-size:12px;\">torch_sconce.glb<\u002Fspan><span style=\"width:150px; color:var(--dim); font-size:12px;\">prefab: torch<\u002Fspan><span style=\"width:90px; color:var(--text); font-size:12px;\">mesh<\u002Fspan><span style=\"width:60px; color:var(--accent); font-size:12px;\">reveal<\u002Fspan><\u002Fdiv>\n                <div style=\"display:flex; align-items:center; gap:14px; padding:0 16px; height:40px; border-bottom:1px solid var(--border); opacity:0.55;\"><span style=\"display:flex; color:var(--warn);\"><svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linejoin=\"round\"><path d=\"M21 7.5 12 3 3 7.5v9L12 21l9-4.5v-9Z\"><\u002Fpath><\u002Fsvg><\u002Fspan><span style=\"flex:1; font-family:'JetBrains Mono',monospace; font-size:12px;\">banner_cloth.glb<\u002Fspan><span style=\"width:150px; color:var(--dim); font-size:12px;\">prefab: banner<\u002Fspan><span style=\"width:90px; color:var(--text); font-size:12px;\">mesh<\u002Fspan><span style=\"width:60px; color:var(--accent); font-size:12px;\">reveal<\u002Fspan><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"height: 26px; flex: none; background: var(--surface); border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 12px; font-size: 11px; color: var(--dim);\">\n              <div style=\"display: flex; gap: 16px; align-items: center;\"><span>project: sample<\u002Fspan><span style=\"color:var(--border);\">|<\u002Fspan><span>13 issues<\u002Fspan><\u002Fdiv>\n              <div style=\"display: flex; gap: 16px; align-items: center;\"><span style=\"color:var(--warn);\">7 missing<\u002Fspan><span style=\"color:var(--border);\">|<\u002Fspan><span style=\"color:var(--err);\">3 dead<\u002Fspan><span style=\"color:var(--border);\">|<\u002Fspan><span>2 orphans · 1 empty<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"position: absolute; left: 12px; top: 130px; width: 22px; height: 22px; border-radius: 50%; background: var(--pin); color: #fff; font-size: 12px; font-weight: 700; display: flex; align-items: center; justify-content: center; box-shadow: 0 1px 4px rgba(0,0,0,.4);\">1<\u002Fdiv>\n        <div style=\"position: absolute; right: 18px; top: 96px; width: 22px; height: 22px; border-radius: 50%; background: var(--pin); color: #fff; font-size: 12px; font-weight: 700; display: flex; align-items: center; justify-content: center; box-shadow: 0 1px 4px rgba(0,0,0,.4);\">2<\u002Fdiv>\n        <div style=\"position: absolute; right: 80px; top: 230px; width: 22px; height: 22px; border-radius: 50%; background: var(--pin); color: #fff; font-size: 12px; font-weight: 700; display: flex; align-items: center; justify-content: center; box-shadow: 0 1px 4px rgba(0,0,0,.4);\">3<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"flex: none; width: 340px; padding-top: 56px;\">\n      <div style=\"font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--label); font-weight: 600; margin-bottom: 16px;\">Build notes<\u002Fdiv>\n      <div style=\"display: flex; flex-direction: column; gap: 18px;\">\n        <div style=\"display: flex; gap: 12px;\"><div style=\"flex:none; width: 22px; height: 22px; border-radius: 50%; background: var(--notepin); color: #fff; font-size: 12px; font-weight: 700; display: flex; align-items: center; justify-content: center;\">1<\u002Fdiv><div style=\"font-size: 13.5px; line-height: 1.55; color: var(--noteink);\"><b style=\"color:var(--notestrong);\">Categories in the panel.<\u002Fb> Missing meshes, dead references, orphans, empty slots — each with a live count. Missing meshes is <b>Ryan's to-build queue<\u002Fb>; the rest are correctness checks. Selecting a category fills the list.<\u002Fdiv><\u002Fdiv>\n        <div style=\"display: flex; gap: 12px;\"><div style=\"flex:none; width: 22px; height: 22px; border-radius: 50%; background: var(--notepin); color: #fff; font-size: 12px; font-weight: 700; display: flex; align-items: center; justify-content: center;\">2<\u002Fdiv><div style=\"font-size: 13.5px; line-height: 1.55; color: var(--noteink);\"><b style=\"color:var(--notestrong);\">Scan is an engine concern.<\u002Fb> The deep scan (dead refs, orphans) and the asset conventions belong to the engine; the editor <i>consumes<\u002Fi> the result, it does not own the rules. \"Run deep scan\" re-walks; the missing-mesh list comes free from name-binding resolution.<\u002Fdiv><\u002Fdiv>\n        <div style=\"display: flex; gap: 12px;\"><div style=\"flex:none; width: 22px; height: 22px; border-radius: 50%; background: var(--notepin); color: #fff; font-size: 12px; font-weight: 700; display: flex; align-items: center; justify-content: center;\">3<\u002Fdiv><div style=\"font-size: 13.5px; line-height: 1.55; color: var(--noteink);\"><b style=\"color:var(--notestrong);\">Every row navigates to source.<\u002Fb> Each issue carries where it is referenced and a <span style=\"color:var(--ink);\">reveal<\u002Fspan> that jumps to it (opens the prefab/scene tab, selects the instance). Pairs with the glTF loader + asset binding when those land.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- handoff footer -->\n  <div style=\"max-width: 1000px; margin-top: 40px; padding: 22px 26px; background: var(--feature-bg); border: 1px solid var(--feature-border); border-radius: 8px;\">\n    <div style=\"font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase; color: #4a86d8; font-weight: 600; margin-bottom: 10px;\">For the CC sessions<\u002Fdiv>\n    <div style=\"font-size: 13.5px; line-height: 1.6; color: var(--feature-sub);\">Every view drops into the built, locked shell — native title bar, the dockable nav panel with the bottom icon bar, a tab over the per-context editor area, the view-column status bar. Viewport contexts (Scene, Prefab) share one picking + gizmo + floating-inspector core; data contexts (Lighting, Playtest, Integrity) are egui forms and lists on <code style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--feature-strong);\">--surface<\u002Fcode> over <code style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--feature-strong);\">--editor<\u002Fcode>. Authoring flows through <code style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--feature-strong);\">action::handle<\u002Fcode> (the single writer); Playtest is the one read-only view. Build one frame per brief, design first, commit green.<\u002Fdiv>\n  <\u002Fdiv>\n\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { theme: 'system' };\n  componentDidMount() {\n    try {\n      const t = localStorage.getItem('wokSpecTheme') || 'system';\n      this.applyTheme(t);\n      this.setState({ theme: t });\n    } catch (e) {}\n  }\n  applyTheme(t) {\n    const r = document.documentElement;\n    if (t === 'system') r.removeAttribute('data-theme');\n    else r.setAttribute('data-theme', t);\n  }\n  setTheme(t) {\n    this.applyTheme(t);\n    try { localStorage.setItem('wokSpecTheme', t); } catch (e) {}\n    this.setState({ theme: t });\n  }\n  seg(on) {\n    return 'padding:5px 13px; border-radius:5px; cursor:pointer; font-size:12.5px; font-weight:500; border:none; font-family:inherit; transition:background .12s; background:' +\n      (on ? 'var(--accent)' : 'transparent') + '; color:' + (on ? '#fff' : 'var(--dim)') + ';';\n  }\n  renderVals() {\n    const t = this.state.theme;\n    return {\n      styleSystem: this.seg(t === 'system'),\n      styleLight: this.seg(t === 'light'),\n      styleDark: this.seg(t === 'dark'),\n      setSystem: () => this.setTheme('system'),\n      setLight: () => this.setTheme('light'),\n      setDark: () => this.setTheme('dark'),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
